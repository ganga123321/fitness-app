<!DOCTYPE html>
<html>
<head>
  <title>Fitness Tracker</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
    }
    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: #22c55e;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
    }
    h2 { color: #22c55e; }
  </style>
</head>

<body>

<h1>🔥 Fitness Tracker</h1>

<div class="card">
  <h2>Calories</h2>
  <input id="calories" placeholder="Calories Consumed">
</div>

<div class="card">
  <h2>Workout</h2>
  <input id="workout" placeholder="Workout Type">
</div>

<div class="card">
  <h2>Steps</h2>
  <input id="steps" placeholder="Steps">
</div>

<div class="card">
  <h2>Water</h2>
  <input id="water" placeholder="Glasses">
</div>

<div class="card">
  <h2>Meals</h2>
  <input id="breakfast" placeholder="Breakfast">
  <input id="lunch" placeholder="Lunch">
  <input id="dinner" placeholder="Dinner">
</div>

<div class="card">
  <h2>Sleep</h2>
  <input id="sleep" placeholder="Hours slept">
</div>

<button onclick="saveData()">💾 Save Data</button>

<script>
function saveData() {
  localStorage.setItem("calories", document.getElementById("calories").value);
  localStorage.setItem("workout", document.getElementById("workout").value);
  localStorage.setItem("steps", document.getElementById("steps").value);
  localStorage.setItem("water", document.getElementById("water").value);
  localStorage.setItem("breakfast", document.getElementById("breakfast").value);
  localStorage.setItem("lunch", document.getElementById("lunch").value);
  localStorage.setItem("dinner", document.getElementById("dinner").value);
  localStorage.setItem("sleep", document.getElementById("sleep").value);

  alert("Data Saved ✅");
}

// Load data on page open
window.onload = function() {
  document.getElementById("calories").value = localStorage.getItem("calories") || "";
  document.getElementById("workout").value = localStorage.getItem("workout") || "";
  document.getElementById("steps").value = localStorage.getItem("steps") || "";
  document.getElementById("water").value = localStorage.getItem("water") || "";
  document.getElementById("breakfast").value = localStorage.getItem("breakfast") || "";
  document.getElementById("lunch").value = localStorage.getItem("lunch") || "";
  document.getElementById("dinner").value = localStorage.getItem("dinner") || "";
  document.getElementById("sleep").value = localStorage.getItem("sleep") || "";
};
</script>

</body>
</html>
