<!DOCTYPE html>
<html>
<head>
  <title>Fitness Tracker</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
    }
    h2 { color: #22c55e; }
  </style>
</head>

<body>

<h1>🔥 Fitness Tracker</h1>

<div class="card">
  <h2>Calories</h2>
  <input placeholder="Calories Consumed">
</div>

<div class="card">
  <h2>Workout</h2>
  <input placeholder="Workout Type">
</div>

<div class="card">
  <h2>Steps</h2>
  <input placeholder="Steps (Goal 10000)">
</div>

<div class="card">
  <h2>Water</h2>
  <input placeholder="Glasses (8)">
</div>

<div class="card">
  <h2>Meals</h2>
  <input placeholder="Breakfast">
  <input placeholder="Lunch">
  <input placeholder="Dinner">
</div>

<div class="card">
  <h2>Sleep</h2>
  <input placeholder="Hours slept">
</div>

</body>
</html>
